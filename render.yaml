services:
  - type: web
    name: family-vk-app-frontend
    runtime: static
    buildCommand: 'npm ci && npm run build:web'
    staticPublishPath: ./dist
    branch: main
    autoDeploy: true
    routes:
      - type: rewrite
        source: /
        destination: /index.html
  - type: web
    name: family-vk-app-backend
    runtime: python
    region: oregon
    rootDir: api
    buildCommand: 'pip install -r requirements.txt'
    startCommand: 'gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT'
    healthCheckPath: /
    envVars:
      - key: PYTHON_VERSION
        value: 3.12.4
      - fromGroup: family-vk-app
    plan: free
    branch: main
    autoDeploy: true
